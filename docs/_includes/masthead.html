{% if site.title or site.logo %}
  <div class="masthead">
    <div class="masthead__inner-wrap">
      <div class="masthead__menu">
        <nav id="site-nav" class="greedy-nav">
          {% if site.logo %}
            <a href="{{ site.baseurl }}/" class="site-logo" rel="home"><img src="{{ site.logo | relative_url }}" alt="{{ site.title | escape }}"></a>
          {% else %}
            <a href="{{ site.baseurl }}/" class="site-title" rel="home">{{ site.title | escape }}</a>
          {% endif %}

          <!-- 搜索按钮，放在标题/Logo 右侧、汉堡菜单左侧 -->
          <button class="search-button" onclick="toggleSearchModal()">
            <i class="fas fa-search"></i>
          </button>

          <ul class="visible-links">
            {%- for link in site.data.navigation.main -%}
              <li class="masthead__menu-item">
                <a href="{{ link.url | relative_url }}"{% if link.url == page.url %} class="active"{% endif %}>{{ link.title | escape }}</a>
              </li>
            {%- endfor -%}
          </ul>

          <button class="greedy-nav__toggle" type="button">
            <span class="visually-hidden">Toggle menu</span>
            <div class="navicon"></div>
          </button>
          <ul class="hidden-links hidden"></ul>
        </nav>
      </div>
    </div>
  </div>
{% endif %}

<!-- 搜索弹窗（点击搜索图标弹出） -->
<div id="search-modal" class="search-modal" style="display: none;">
  <div class="search-modal-content">
    <div class="search-header">
      <input type="text" id="search-input" placeholder="搜索文章标题..." autocomplete="off" autofocus>
      <button onclick="closeSearchModal()" class="close-btn">✕</button>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>
</div>

<style>
  .search-button {
    background: none;
    border: none;
    color: inherit;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 8px 12px;
    margin-left: 8px;
  }
  .search-button:hover { opacity: 0.8; }

  .search-modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .search-modal-content {
    background: #111;
    width: 90%;
    max-width: 600px;
    border-radius: 16px;
    overflow: hidden;
  }
  .search-header {
    padding: 16px;
    display: flex;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #search-input {
    flex: 1;
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 16px;
  }
  .close-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
  }
  .search-results {
    max-height: 70vh;
    overflow-y: auto;
    padding: 8px 0;
  }
  .search-result-item {
    padding: 12px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    color: #ddd;
    text-decoration: none;
    display: block;
  }
  .search-result-item:hover {
    background: rgba(255,255,255,0.08);
  }
  .search-result-item .title {
    font-weight: 600;
    color: #fff;
  }
</style>

<script>
// Lunr 搜索（搜索标题优先）
let searchIndex;
let documents = [];

async function loadSearchIndex() {
  try {
    const response = await fetch('{{ site.baseurl }}/search.json');
    documents = await response.json();
    
    searchIndex = lunr(function () {
      this.ref('id');
      this.field('title', { boost: 10 });   // 标题权重最高
      this.field('content');
      this.field('excerpt');
      
      documents.forEach((doc, i) => {
        this.add({
          id: i,
          title: doc.title,
          content: doc.content || '',
          excerpt: doc.excerpt || ''
        });
      });
    });
  } catch (e) {
    console.error('搜索索引加载失败', e);
  }
}

function toggleSearchModal() {
  const modal = document.getElementById('search-modal');
  modal.style.display = 'flex';
  document.getElementById('search-input').focus();
  if (!searchIndex) loadSearchIndex();
}

function closeSearchModal() {
  document.getElementById('search-modal').style.display = 'none';
}

document.getElementById('search-input').addEventListener('input', function () {
  const query = this.value.trim();
  const resultsContainer = document.getElementById('search-results');
  resultsContainer.innerHTML = '';

  if (query.length < 2 || !searchIndex) return;

  const results = searchIndex.search(query + '*');  // 支持模糊搜索

  results.forEach(result => {
    const doc = documents[result.ref];
    if (!doc) return;

    const item = document.createElement('a');
    item.href = doc.url;
    item.className = 'search-result-item';
    item.innerHTML = `
      <div class="title">${doc.title}</div>
      \( {doc.excerpt ? `<div class="excerpt"> \){doc.excerpt.substring(0, 120)}...</div>` : ''}
    `;
    resultsContainer.appendChild(item);
  });

  if (results.length === 0) {
    resultsContainer.innerHTML = '<div style="padding:20px;text-align:center;color:#888;">没有找到匹配的文章标题</div>';
  }
});

// 点击空白处关闭
document.getElementById('search-modal').addEventListener('click', function(e) {
  if (e.target === this) closeSearchModal();
});
    </script>
