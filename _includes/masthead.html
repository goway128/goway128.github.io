<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        
        <!-- 左 -->
        <a class="site-title" href="/">goway128.club</a>

        <!-- ==================== 搜索框 ==================== -->
        <div class="masthead-search">
          <input type="text" id="search-input" placeholder="搜索文章标题..." autocomplete="off">
          <div id="search-results" class="search-results"></div>
        </div>
        <!-- ============================================== -->

        <!-- 右侧导航链接 -->
        <ul class="visible-links">
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{{ link.url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
        </ul>

        <!--  -->
        <button class="greedy-nav__toggle hidden-lg" type="button">
          <span class="visually-hidden">Toggle Menu</span>
          <div class="navicon"></div>
        </button>
      </nav>
    </div>
  </div>
</div>

<script>
// 搜索
let articles = [];

fetch('/search.json')
  .then(response => response.json())
  .then(data => { articles = data; })
  .catch(err => console.error('search.json 加载失败', err));

const input = document.getElementById('search-input');
const resultsBox = document.getElementById('search-results');

input.addEventListener('input', function() {
  const query = this.value.trim().toLowerCase();
  resultsBox.innerHTML = '';

  if (query.length < 1) {
    resultsBox.style.display = 'none';
    return;
  }

  const filtered = articles.filter(article => 
    article.title.toLowerCase().includes(query)
  );

  if (filtered.length === 0) {
    resultsBox.innerHTML = '<div class="no-result">没有找到匹配的文章</div>';
  } else {
    filtered.forEach(article => {
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.innerHTML = `<a href="\( {article.url}"> \){article.title}</a>`;
      resultsBox.appendChild(div);
    });
  }
  resultsBox.style.display = 'block';
});

// 点击
document.addEventListener('click', function(e) {
  if (!input.contains(e.target) && !resultsBox.contains(e.target)) {
    resultsBox.style.display = 'none';
  }
});
</script>

<style>
.masthead-search {
  position: relative;
  margin: 0 15px;
  flex: 1;
  max-width: 360px;
}

#search-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #555;
  border-radius: 6px;
  background: #1f1f2e;
  color: #eee;
  font-size: 15px;
}

#search-input:focus {
  border-color: #7eb6ff;
  outline: none;
}

.search-results {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: #1f1f2e;
  border: 1px solid #444;
  border-radius: 6px;
  margin-top: 4px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 999;
  display: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.6);
}

.search-result-item {
  padding: 11px 14px;
  border-bottom: 1px solid #333;
}

.search-result-item:last-child { border-bottom: none; }

.search-result-item a {
  color: #a0d0ff;
  text-decoration: none;
}

.search-result-item a:hover { color: white; }

.no-result { padding: 12px; color: #888; }

/* 移动端 */
@media (max-width: 1023px) {
  .masthead-search {
    margin: 12px auto;
    max-width: 92%;
    order: -1;
  }
  .greedy-nav { 
    flex-direction: column; 
    align-items: center; 
  }
}
</style>
